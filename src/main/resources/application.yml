server:
  port: 8080

spring:
  application:
    name: shop-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shop}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html